name: Release

# Build per-platform bundles when a version tag is pushed (e.g. v1.1.0).
# Use workflow_dispatch to build the bundles without publishing a release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
          - os: macos-14
            target: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20

      # Production deps only; --ignore-scripts skips Playwright's browser
      # download (we drive the system-installed Google Chrome via channel: 'chrome').
      - name: Install production dependencies
        run: npm ci --omit=dev --ignore-scripts

      - name: Stage bundle
        run: node scripts/build-bundle.js dist/rts-drm-recorder

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/rts-drm-recorder -DestinationPath rts-drm-recorder-${{ matrix.target }}.zip

      - name: Archive (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/rts-drm-recorder rts-drm-recorder-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: rts-drm-recorder-${{ matrix.target }}
          path: rts-drm-recorder-${{ matrix.target }}.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
